  /api/v1/sponsor/merchants/payment-detail/initiate-micro-deposits/{request_user_id}/:
    post:
      operationId: Initiate Micro-Deposits
      description: |-
        This endpoint will only be used after an error occurs when verifying the Micro-Deposits.
        Ie. The merchant exhausts their attempts for verification (More than three wrong attempts),
        or their Micro-Deposits expire (after 14 days). This endpoint needs to be called when the
        bank_account_status is VerificationFailed.

        **Requirements:**
        - Authentication information, user, and password are required for this endpoint.
        - Sponsor ID will be determined by the authentication information used.
        - The request_user_id should have an admin role on the account.
        - No fields are required for this POST.
      parameters:
      - in: path
        name: request_user_id
        schema:
          type: string
        required: true
      tags:
      - SponsorAPI _ Merchant
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PartnerMerchantMicroDepositInitiate'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PartnerMerchantMicroDepositInitiate'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PartnerMerchantMicroDepositInitiate'
      security:
      - basicAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MerchantCommonResponse'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MerchantCommonResponse'
          description: ''
  /api/v1/sponsor/merchants/payment-detail/verify-micro-deposits/{request_user_id}/:
    post:
      operationId: Verify Micro-Deposits
      description: |-
        Micro-deposits are two small deposits (a maximum of $0.99, a minimum of $0.01, and inclusive) that verify
        the merchant's business bank account. The values accept a float directly or a string representation of the
        cents amount. ("0.75" and "0.01")

        Requirements:
        Authentication information, user, and password are required for this endpoint. Sponsor ID will be determined
        by the authentication information used. The request_user_id should have an admin role on the account.
      parameters:
      - in: path
        name: request_user_id
        schema:
          type: string
        required: true
      tags:
      - SponsorAPI _ Merchant
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PartnerMerchantVerifyMicroDeposits'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PartnerMerchantVerifyMicroDeposits'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PartnerMerchantVerifyMicroDeposits'
        required: true
      security:
      - basicAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MerchantCommonResponse'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MerchantCommonResponse'
          description: ''
