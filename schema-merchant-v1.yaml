  /api/v1/sponsor/merchants/onboarding/:
    post:
      operationId: Merchant Pre Onboarding
      description: |-
        The merchant’s first step is to request an invitation to apply.
        The merchant provides the sponsor with required business and contact information,
        which the sponsor then submits to Momnt for storage and initial account creation.
        The response from this endpoint allows the sponsor to store Momnt’s merchant-specific identifiers for future use.

        After a successful request, Momnt sends the new merchant an email invitation to complete their application
        using Momnt’s merchant onboarding user interface (UI). Please ensure the address submitted is a valid,
        mailable address. Momnt uses Smarty Streets (smarty.com) as the address verification provider.

        **Notes for Testing:**
        - After a successful POST, a merchant account will be created along with the first merchant admin user.
        - If you wish to test again, you must change the `users_business_email`, `user_id`,
        and `contractor_id` values so they are unique for each request.

        **Error Responses:**
        - 400: `User Already Exists`
        - 400: `Merchant Already Exists`
        - 400: `Merchant User Already Exists`
      tags:
      - SponsorAPI _ Merchant
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PartnerMerchantPreOnboardingSchema'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PartnerMerchantPreOnboardingSchema'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PartnerMerchantPreOnboardingSchema'
        required: true
      security:
      - basicAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PartnerMerchantPreOnboardingResponse'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailResponse'
          description: ''
      callbacks:
        pre_onboarding_callback:
          /path-to-callback/:
            post:
              description: |-
                Merchant Pre-Onboarding Callback (POST)
                For an external partner to create a merchant, a user with admin/owner permissions on
                that merchant must complete Momnt's onboarding workflow. Once the workflow is successfully completed,
                and the user has accepted the Terms & Conditions,
                Momnt will send a callback and POST the finalized merchant data.

                **Requirements**
                - A successful start-merchant-onboarding POST must occur before any callback will fire.
                - The merchant user must complete the onboarding UI flow and accept the Terms & Conditions.
                - Only after both steps are complete will Momnt issue the callback.

                **URL Parameters**
                - URL parameters should follow standard key/value format and are fully optional.
                - Authentication for the callback uses Basic Auth, requiring a username and password
                that the partner provides to Momnt and that Momnt stores securely in our system.
              requestBody:
                content:
                  application/json:
                    schema:
                      $ref: '#/components/schemas/CallbackPartnerMerchantPreOnboardingSchema'
                required: true
              responses:
                '201':
                  content:
                    application/json:
                      schema:
                        $ref: '#/components/schemas/PartnerMerchantPreOnboardingResponse'
                  description: ''
                '400':
                  content:
                    application/json:
                      schema:
                        $ref: '#/components/schemas/DetailResponse'
                  description: ''
