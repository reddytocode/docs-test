            * `Main/HQ` - Main/HQ
            * `Home` - Home
            * `Work` - Work
            * `Other` - Other
            * `Collections Agency` - Collections Agency
          x-spec-enum-id: 4b3e23bbd4bee69a
        address_1:
          type: string
          maxLength: 255
        address_2:
          type: string
          maxLength: 255
        city:
          type: string
          maxLength: 255
        state:
          type: string
          maxLength: 2
        zip_code:
          type: string
          maxLength: 10
