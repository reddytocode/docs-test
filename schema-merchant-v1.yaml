  /api/v1/sponsor/merchants/rate-sheets/{request_user_id}/:
    get:
      operationId: Merchant Rate Sheet List
      description: |-
        A merchant that is approved and active should always have a rate sheet set up with Momnt.
        If a merchant does not select any products on their rate sheet, consumers who apply via that
        merchant will not get any offers. The rate sheet allows the merchant to view available loan
        products and details associated with those products including descriptions, APRs, terms, and
        merchant fees.
        This GET endpoint will return the rate sheet for a given merchant.

        **Requirements:**
        - request_user_id: There must be a user ID in the Momnt system for this GET request to succeed.
        That user must be active and have Admin permission, in this specific merchant/sponsor.
        This user ID should have been established in previous interactions, such as pre-onboarding or create_user.
      parameters:
      - in: query
        name: is_merchant_selected
        schema:
          type: boolean
        description: Filter by whether the product is selected by the merchant
      - in: path
        name: request_user_id
        schema:
          type: string
        required: true
      tags:
      - SponsorAPI _ Merchant
      security:
      - basicAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PartnerMerchantRateSheetList'
          description: ''
  /api/v1/sponsor/merchants/users/:
    post:
      operationId: Merchant User Creation
      description: |-
        For an external partner to create/update a user. Fields provided will be checked against the Momnt database
        to ensure permissions and accounts exist. Users are created in Merchants; therefore, a merchant must exist.
        Users are created by Admin users; therefore, one must exist. To that end: A successful merchant onboarding workflow
        should have been created before this endpoint can't be used effectively.

        **Requirements:**
        - request_user_id: There must be a user ID in our system for this POST request to succeed. That user must
        have permission to create subsequent users, in this specific merchant/sponsor. This user ID should have
        been established in previous interactions, such as pre-onboarding. Therefore, this field should be in the
        partner's database as well as Momnt.
      tags:
      - SponsorAPI _ Merchant
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PartnerMerchantUserCreateRequestSchema'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PartnerMerchantUserCreateRequestSchema'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PartnerMerchantUserCreateRequestSchema'
        required: true
      security:
      - basicAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PartnerMerchantUserCreateResponseSchema'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailResponse'
          description: ''
    patch:
      operationId: Merchant User Update
      description: |-
        For an external partner to create/update a user. Fields provided will be checked against the Momnt database
        to ensure permissions and accounts exist. Users are created in Merchants; therefore, a merchant must exist.
        Users are created by Admin users; therefore, one must exist. To that end: A successful merchant onboarding workflow
        should have been created before this endpoint can't be used effectively.

        **Requirements:**
        - request_user_id: There must be a user ID in our system for this POST request to succeed. That user must
        have permission to create subsequent users, in this specific merchant/sponsor. This user ID should have
        been established in previous interactions, such as pre-onboarding. Therefore, this field should be in the
        partner's database as well as Momnt.
