      security:
      - basicAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExternalOfferCodeRead'
          description: ''
    patch:
      operationId: Offer Code Update
      description: |-
        Soft delete functionality for offer codes.
        This endpoint implements soft deletion using PATCH.
        Behavior:
        - Updates the `is_deleted` field to mark offer codes as deleted
        - Returns a custom success message when `is_deleted` changes from False to True
        - Prevents restoration by rejecting attempts to change `is_deleted` from True to False
        - Returns HTTP 400 Bad Request for invalid deletion state transitions
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: The ID of the offer code
        required: true
      - in: path
        name: merchant_uuid
        schema:
          type: string
          format: uuid
        description: 'The external organization ID of the merchant. aka: `external_org_id`'
        required: true
      tags:
      - SponsorAPI _ Merchant
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedExternalOfferCodeCreateSchema'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedExternalOfferCodeCreateSchema'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedExternalOfferCodeCreateSchema'
      security:
      - basicAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExternalOfferCodeUpdateResponseSchema'
          description: ''
