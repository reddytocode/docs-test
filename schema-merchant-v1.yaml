    MomntEvent:
      description: |-
        Base model for all Momnt platform events sent to AWS EventBridge.

        This class defines the common structure and metadata required for event publication,
        and serves as the foundation for more specific event types. It enforces versioning,
        event bus targeting, and standard fields like `initiated_by` and `env` to ensure
        consistency across event payloads.

        Attributes:
        version (str): Semantic version of the event schema (default: "1.0.0").
        event_bus_name (EventBusName): Target EventBridge bus for the event (default: EventBusName.APPLICATION).
        detail_type (str): A descriptor for the type of event, used by consumers for filtering.
        initiated_by (Optional[str]): Identifier for the actor or system that initiated the event (default: "Unset").
        env (Optional[str]): The environment (e.g., dev, staging, prod) from which the event was
        emitted (default: "Unset").

        Methods:
        validate_version(v: str): Ensures the `version` string adheres to semantic versioning (X.Y.Z).
        to_json(): Serializes the event to JSON, excluding internal routing metadata (`detail_type`, `event_bus_name`).
      properties:
        version:
          default: 1.0.0
          description: The version of the event schema, following semantic versioning
            (X.Y.Z).
          title: Version
          type: string
        event_bus_name:
          $ref: '#/components/schemas/EventBusName'
          default: application
          description: Name of the event bus to publish to
        detail_type:
          description: Detail type for the event
          title: Detail Type
          type: string
        initiated_by:
          anyOf:
          - type: string
          - type: 'null'
          default: Unset
          description: Who initiated the event
          title: Initiated By
        env:
          anyOf:
          - type: string
          - type: 'null'
          default: Unset
          description: Environment where the event is emitted
          title: Env
        created_at:
          description: Timestamp of when the event was emitted
          format: date-time
          title: Created At
          type: string
      required:
      - detail_type
      title: MomntEvent
      type: object
