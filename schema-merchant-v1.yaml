          description: ''
    post:
      operationId: Offer Code Create
      description: |-
        Authentication information, user, and password are required for this endpoint.
        Sponsor ID will be determined by the authentication information used.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: The ID of the offer code
        required: true
      - in: path
        name: merchant_uuid
