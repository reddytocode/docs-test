        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExternalOfferCodeCreateSchema'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ExternalOfferCodeCreateSchema'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ExternalOfferCodeCreateSchema'
        required: true
      security:
      - basicAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExternalOfferCodeCreateSchema'
          description: ''
  /api/v1/sponsor/merchants/{merchant_uuid}/offer-code/{id}/:
    get:
      operationId: Offer Code Retrieve
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: The ID of the offer code
        required: true
      - in: path
        name: merchant_uuid
        schema:
          type: string
          format: uuid
        description: 'The external organization ID of the merchant. aka: `external_org_id`'
        required: true
