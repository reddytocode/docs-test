  securitySchemes:
    Moov Webhook Signature:
      type: apiKey
      in: header
      name: HTTP_X-Signature
      description: |-
        Authentication via Moov Webhook Signature. Requires all headers:
        - `HTTP_X-Timestamp`
        - `HTTP_X-Nonce`
        - `HTTP_X-Webhook-Id`
        - `HTTP_X-Signature`
    basicAuth:
      type: http
      scheme: basic
    jwtAuth:
      type: apiKey
      in: header
      name: Authorization
      description: Token-based authentication with required prefix "JWT"
    tokenAuth:
      type: apiKey
      in: header
      name: Authorization
      description: Token-based authentication with required prefix "Token"
